# coturn config for UpDesk TURN relay (NAT traversal fallback).
# Run on a host reachable by both peers (a cloud VM for real remote use;
# TURN is not meaningfully testable on a single LAN).

listening-port=3478
tls-listening-port=5349
fingerprint

# Long-term credential mechanism. Match these in apps/*/src/rtcConfig.js.
lt-cred-mech
user=updesk:CHANGE_ME
realm=updesk

# Relay port range (open these in the firewall / security group).
min-port=49152
max-port=65535
no-cli

# On a cloud host behind a 1:1 NAT, advertise the public IP:
# external-ip=YOUR_PUBLIC_IP

# For turns:// (TLS) — reuse a real cert in production:
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/key.pem
