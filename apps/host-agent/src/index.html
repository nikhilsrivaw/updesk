<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UpDesk Host</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>UpDesk Host</h1>

      <section id="config">
        <p class="hint">Go online, then share your ID and PIN with whoever is helping you.</p>
        <label class="check">
          <input id="autostart" type="checkbox" />
          Start UpDesk when I sign in
        </label>
        <button id="connectBtn">Go online</button>
        <input id="server" type="hidden" value="wss://updesk.duckdns.org" />
        <button id="testOverlayBtn" class="secondary small" hidden>Test annotation overlay (auto-hides)</button>
      </section>

      <section id="live" hidden>
        <div id="status">connecting…</div>
        <div id="idCard" hidden>
          <div class="id-row"><span class="id-label">Your ID</span><b id="myId">—</b></div>
          <div class="id-row"><span class="id-label">PIN</span><b id="myPin">—</b><button id="newPinBtn" class="small secondary">New PIN</button></div>
          <p class="hint">Give both to the person connecting. The PIN changes each time you make a new one.</p>
        </div>
        <button id="reconfigureBtn" class="secondary small">Go offline</button>
        <div id="banner" hidden>
          🔴 <b id="controllerName"></b> is controlling this machine
          <button id="switchBtn" class="small secondary">Switch screen</button>
          <button id="sendFileBtn" class="small secondary">Send file</button>
          <button id="stopBtn" class="small">Stop</button>
          <input id="fileInput" type="file" multiple hidden />
        </div>
        <div id="request" hidden>
          <p><b id="requester"></b> wants to control this machine.</p>
          <div class="perms">
            <span class="perms-title">Allow this controller to:</span>
            <label class="check"><input id="permInput" type="checkbox" checked /> Use keyboard &amp; mouse</label>
            <label class="check"><input id="permClipboard" type="checkbox" checked /> Sync clipboard</label>
            <label class="check"><input id="permFile" type="checkbox" checked /> Transfer files</label>
          </div>
          <button id="acceptBtn">Accept &amp; share screen</button>
          <button id="rejectBtn" class="secondary">Reject</button>
        </div>
        <div id="chat" hidden>
          <div id="chatLog"></div>
          <div class="chat-input">
            <input id="chatInput" placeholder="Message the controller…" />
            <button id="chatSend" class="small">Send</button>
          </div>
        </div>
        <ul id="log"></ul>
      </section>
    </main>
    <script type="module" src="host.js"></script>
  </body>
</html>
