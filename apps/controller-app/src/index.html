<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UpDesk Controller</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section id="config">
        <h1>UpDesk Controller</h1>
        <p class="hint">Ask the other person for their ID and PIN (shown in their UpDesk Host window).</p>
        <label>Partner ID
          <input id="partnerId" inputmode="numeric" placeholder="123 456 789" />
        </label>
        <label>PIN
          <input id="pin" inputmode="numeric" placeholder="4-digit PIN" />
        </label>
        <label>Examiner (for chain of custody)
          <input id="examiner" placeholder="your name / badge ID" />
        </label>
        <input id="server" type="hidden" value="wss://updesk.duckdns.org" />
        <button id="connectBtn">Connect</button>
        <div id="recents" class="recents" hidden></div>
      </section>

      <section id="live" hidden>
        <div id="bar">
          <span id="status">connecting…</span>
          <span class="bar-actions">
            <label class="quality-label">Quality
              <select id="quality" disabled>
                <option value="high">High</option>
                <option value="balanced">Balanced</option>
                <option value="saver">Data saver</option>
              </select>
            </label>
            <button id="enableAudioBtn" class="small" hidden>🔊 Enable sound</button>
            <button id="sendFileBtn" class="small" disabled>Send file</button>
            <button id="filesBtn" class="small" hidden>Files</button>
            <button id="netBtn" class="small" hidden>Network</button>
            <button id="custodyBtn" class="small">Evidence log</button>
            <button id="drawToggle" class="small" hidden>Draw</button>
            <button id="drawClear" class="small" hidden>Clear</button>
            <button id="chatToggle" class="small">Chat</button>
            <button id="endBtn" class="small danger">End session</button>
            <button id="reconfigureBtn" class="small">Reconfigure</button>
          </span>
          <input id="fileInput" type="file" multiple hidden />
        </div>
        <video id="screen" autoplay playsinline></video>
        <div id="fsPanel" hidden>
          <div class="fs-header">
            <button id="fsUp" class="small" title="Back to parent folder">⬆</button>
            <input id="fsPath" class="fs-pathinput" placeholder="/storage/emulated/0" spellcheck="false" />
            <button id="fsGo" class="small">Go</button>
            <button id="fsClose" class="small">✕</button>
          </div>
          <div id="fsList"></div>
          <div id="fsStatus" class="fs-statusbar"></div>
        </div>

        <div id="netPanel" hidden>
          <div class="fs-header">
            <span class="fs-pathbar">Network — <span id="netCount">0 connections</span> (live)</span>
            <button id="netExport" class="small">Export</button>
            <button id="netClose" class="small">✕</button>
          </div>
          <div id="netList"></div>
        </div>

        <div id="custodyPanel" hidden>
          <div class="fs-header">
            <span class="fs-pathbar">Chain of custody — <span id="custodyCount">0 items</span></span>
            <button id="custodyCsv" class="small">CSV</button>
            <button id="custodyJson" class="small">JSON</button>
            <button id="custodyClose" class="small">✕</button>
          </div>
          <div id="custodyList"></div>
          <div id="custodyStatus" class="fs-statusbar"></div>
        </div>

        <div id="chat" hidden>
          <div class="chat-header" id="chatHeader">
            <span>Chat</span>
            <button id="chatMin" class="chat-min" title="Minimize">–</button>
          </div>
          <div id="chatBody">
            <div id="chatLog"></div>
            <div class="chat-input">
              <input id="chatInput" placeholder="Message the host…" />
              <button id="chatSend" class="small">Send</button>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="controller.js"></script>
  </body>
</html>
